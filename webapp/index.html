<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>财经博主研究台</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/app.css" />
</head>

<body>
    <div class="research-shell">
        <aside class="side-pane" aria-label="财经博主">
            <header class="pane-header brand-header">
                <p class="eyebrow">Research Console</p>
                <h1>财经博主研究台</h1>
                <p class="subtle">批量保存公众号文章，按作者沉淀每日观点。</p>
            </header>

            <div class="side-controls">
                <label class="field-label" for="author-search">搜索博主</label>
                <input id="author-search" class="text-input" type="search" placeholder="作者或公众号" autocomplete="off" />
                <button id="all-authors-btn" class="author-filter active" type="button">
                    <span>全部博主</span>
                    <strong id="total-article-count">0</strong>
                </button>
            </div>

            <div class="pane-title-row">
                <h2>博主列表</h2>
                <span id="author-count" class="count-label">0 位</span>
            </div>
            <div id="authors" class="author-list" aria-live="polite"></div>
        </aside>

        <main class="workspace-pane" aria-label="批量抓取和每日文章">
            <section class="ingest-panel" aria-labelledby="batch-title">
                <div class="pane-title-row">
                    <div>
                        <h2 id="batch-title">批量抓取</h2>
                        <p class="section-note">每行一个微信公众号文章链接，一次最多 20 个。</p>
                    </div>
                    <span id="link-counter" class="count-label">0 / 20</span>
                </div>

                <label class="field-label" for="batch-links">文章链接</label>
                <textarea id="batch-links" class="batch-input" rows="6"
                    placeholder="https://mp.weixin.qq.com/s/..." spellcheck="false"></textarea>

                <div class="batch-actions">
                    <button id="parse-links-btn" class="secondary-btn" type="button">解析链接</button>
                    <button id="start-fetch-btn" class="primary-btn" type="button" disabled>开始抓取</button>
                    <span id="batch-status" class="inline-status"></span>
                </div>

                <div id="queue-list" class="queue-list" aria-live="polite"></div>
            </section>

            <section class="article-panel" aria-labelledby="daily-title">
                <div class="pane-title-row article-toolbar">
                    <div>
                        <h2 id="daily-title">每日文章</h2>
                        <p id="active-filter" class="section-note">全部博主</p>
                    </div>
                    <span id="article-count" class="count-label">0 篇</span>
                </div>

                <div class="range-tabs" role="tablist" aria-label="日期筛选">
                    <button class="range-tab active" type="button" data-range="today">今天</button>
                    <button class="range-tab" type="button" data-range="yesterday">昨天</button>
                    <button class="range-tab" type="button" data-range="7d">近 7 天</button>
                    <button class="range-tab" type="button" data-range="all">全部</button>
                </div>

                <div id="articles" class="article-list" aria-live="polite"></div>
            </section>
        </main>

        <aside class="detail-pane" aria-label="文章详情">
            <div class="pane-title-row detail-heading">
                <div>
                    <h2>文章详情</h2>
                    <p class="section-note">摘要、观点和本地文件入口</p>
                </div>
            </div>
            <div id="article-detail" class="detail-empty">粘贴链接开始抓取，或从每日文章中选择一篇查看。</div>
        </aside>
    </div>

    <script type="module" src="/app.js"></script>
</body>

</html>
